<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang học — AVA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23ffd60a%22 rx=%2220%22/><text x=%2250%22 y=%2270%22 font-size=%2260%22 text-anchor=%22middle%22 font-family=%22Arial Black%22 fill=%22%23000%22>A</text></svg>" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="dashboard.html" class="logo">
        <span class="logo-mark">A</span>
        <span>AVA</span>
      </a>
      <div class="header-actions" id="header-actions">
        <span class="spinner"></span>
      </div>
    </div>
  </header>

  <div class="course-layout" id="course-layout">

    <button class="mobile-toggle" id="mobile-toggle">☰ Danh sách bài học</button>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Khóa học</div>
      <div class="sidebar-course-name" id="sidebar-course-name">Đang tải...</div>

      <div class="progress-block">
        <div class="progress-label">
          <span id="progress-count">0/0 bài</span>
          <span class="progress-percent" id="progress-percent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <ul class="lesson-list" id="lesson-list"></ul>
    </aside>

    <section class="main-content">
      <div class="video-wrap" id="video-wrap">
        <div class="video-placeholder">
          <div class="spinner"></div>
          <div>Đang tải bài học...</div>
        </div>
      </div>

      <div class="lesson-content">
        <div class="lesson-header">
          <h1 class="lesson-title-big" id="lesson-title-big">Đang tải...</h1>
          <span class="lesson-badge" id="lesson-badge">● Đang học</span>
        </div>

        <p class="lesson-description" id="lesson-description"></p>

        <div class="timer-info" id="timer-info">
          <span class="timer-icon">⏱</span>
          <span>Đang chuẩn bị...</span>
        </div>

        <div class="action-row">
          <div class="nav-buttons">
            <button class="btn btn-secondary" id="btn-prev">← Bài trước</button>
            <button class="btn btn-secondary" id="btn-next">Bài sau →</button>
          </div>
          <button class="btn btn-primary" id="btn-done" disabled>Hoàn thành bài học</button>
        </div>
      </div>
    </section>

  </div>

  <footer class="site-footer">
    Website học trực tuyến · Host trên GitHub Pages
  </footer>

  <script type="module" src="assets/app.js"></script>
  <script type="module">
    import { initCoursePage } from "./assets/course.js";
    initCoursePage();
  </script>
</body>
</html>
