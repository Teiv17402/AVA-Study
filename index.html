<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học Online — Chào mừng</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23ffd60a%22 rx=%2220%22/><text x=%2250%22 y=%2270%22 font-size=%2260%22 text-anchor=%22middle%22 font-family=%22Arial Black%22 fill=%22%23000%22>H</text></svg>" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="landing-body">

  <div class="landing-loading" id="landing-loading">
    <div class="spinner"></div>
    <p>Đang kiểm tra...</p>
  </div>

  <div class="landing-wrap" id="landing-content" style="display:none">
    <div class="landing-card">
      <div class="landing-logo">H</div>
      <h1>Chào mừng đến với <span class="accent">Học Online</span></h1>
      <p class="landing-subtitle">Hệ thống học trực tuyến chất lượng cao</p>

      <div class="landing-buttons">
        <a href="login.html" class="landing-btn login-btn">
          <span class="landing-btn-icon">🔐</span>
          <div class="landing-btn-content">
            <div class="landing-btn-title">Đăng nhập</div>
            <div class="landing-btn-desc">Tôi đã có tài khoản</div>
          </div>
        </a>

        <a href="https://ava-smoky-ten.vercel.app" class="landing-btn register-btn">
          <span class="landing-btn-icon">📝</span>
          <div class="landing-btn-content">
            <div class="landing-btn-title">Đăng ký mới</div>
            <div class="landing-btn-desc">Làm bài test để bắt đầu</div>
          </div>
        </a>
      </div>

      <p class="landing-note">
        Người mới: bắt đầu bằng bài test 11 câu để chúng tôi hiểu nhu cầu học tập của bạn
      </p>
    </div>
  </div>

  <script type="module" src="assets/landing.js"></script>
</body>
</html>
